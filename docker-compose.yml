services:
  postgres:
    image: postgres:16-alpine
    container_name: edubot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: edubot
      POSTGRES_USER: edubot
      POSTGRES_PASSWORD: edubot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edubot -d edubot"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: edubot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
